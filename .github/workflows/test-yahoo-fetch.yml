# Quick test: can we get Yahoo data from GitHub's IP? No Supabase, no secrets.
# Use this to confirm the daily pipeline will work before running the full pipeline.
name: Test Yahoo Fetch

on:
  workflow_dispatch:

jobs:
  fetch-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run minimal fetch (10 tickers, close only)
        run: python scripts/minimal_fetch_test.py
        working-directory: ${{ github.workspace }}
