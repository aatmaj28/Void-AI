# Daily pipeline: fetch fresh yfinance data and run scoring engine.
# Runs at 6:00 AM Eastern (10:00 UTC) so users see updated data each morning.
# To run manually: Actions → Daily Pipeline → Run workflow.

name: Daily Pipeline

on:
  schedule:
    # Temporary: 10:00 PM Eastern (UTC-5) = 03:00 UTC. Revert to 6 AM EST = 11:00 UTC when done.
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run daily pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DELAY_SECONDS: "0.35"
        run: python scripts/pipeline_daily.py
        working-directory: ${{ github.workspace }}
